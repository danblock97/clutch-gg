name: Bug report
description: Report something broken, incorrect, or unexpected in ClutchGG.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report this. Please share as much detail as you can so we can reproduce it quickly.

  - type: dropdown
    id: game
    attributes:
      label: Game
      description: Which part of ClutchGG were you using?
      options:
        - League of Legends
        - Teamfight Tactics
        - Other / site-wide
    validations:
      required: true

  - type: input
    id: page
    attributes:
      label: Page or feature
      description: Which page, URL, or feature did this happen on?
      placeholder: e.g. /league/profile/euw/summoner-name
    validations:
      required: true

  - type: textarea
    id: bug_summary
    attributes:
      label: What happened?
      description: Tell us what went wrong.
      placeholder: The page loaded, then the match history section stayed blank.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
      placeholder: I expected the latest 20 matches to appear.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the shortest steps we can follow to reproduce the issue.
      placeholder: |
        1. Open ...
        2. Search for ...
        3. Click ...
        4. See error ...
    validations:
      required: true

  - type: input
    id: player
    attributes:
      label: Region and player tag
      description: Optional, but very helpful if this is tied to a specific profile or match.
      placeholder: e.g. EUW / Summoner#EUW

  - type: textarea
    id: errors
    attributes:
      label: Error text or screenshots
      description: Paste any visible error text or drag in screenshots.
      placeholder: Include console errors, API messages, or screenshots if available.

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Share the browser, device, and anything else relevant.
      placeholder: e.g. Chrome 135 on macOS, iPhone Safari, desktop Firefox
    validations:
      required: true
