name: Feature request
description: Suggest an improvement, workflow, or new capability for ClutchGG.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Thanks for sharing an idea. The more context you include, the easier it is to evaluate and prioritize.

  - type: dropdown
    id: game
    attributes:
      label: Area
      description: Which part of ClutchGG would this improve?
      options:
        - League of Legends
        - Teamfight Tactics
        - Profiles
        - Leaderboards
        - Data Studio
        - Other / site-wide
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the frustration, gap, or use case behind this request.
      placeholder: It is hard to compare recent performance across multiple accounts without opening several tabs.
    validations:
      required: true

  - type: textarea
    id: idea
    attributes:
      label: What would you like to see?
      description: Describe the feature or improvement you want.
      placeholder: Add a comparison mode that lets me pin two profiles side by side.
    validations:
      required: true

  - type: textarea
    id: value
    attributes:
      label: Why would this help?
      description: Tell us why this would be valuable to you or other players.
      placeholder: This would make it much easier to review duo partners or compare patches.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Have you found a workaround or another approach?
      placeholder: I currently export screenshots and compare them manually.

  - type: textarea
    id: examples
    attributes:
      label: Mockups, references, or examples
      description: Optional, but helpful if you have links, sketches, or inspiration.
      placeholder: Share screenshots, links, or rough ideas here.
